<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Vertical Stretch for Accent Line */
      @keyframes pulseLine {
        0%, 100% { transform: scaleY(0.9); opacity: 0.7; }
        50% { transform: scaleY(1.02); opacity: 1; }
      }

      /* Animation Classes */
      .accent-line { 
        animation: pulseLine 4s ease-in-out infinite; 
        transform-origin: 64.5px 160px; 
      }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15161a"/>
      <stop offset="100%" stop-color="#1c1e24"/>
    </linearGradient>

    <linearGradient id="white-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="884" height="304" rx="48" fill="url(#bg)" stroke="#8F99A2" stroke-opacity=".18" stroke-width="2"/>

  <rect class="accent-line" x="62" y="76" width="5" height="168" rx="2.5" fill="url(#white-glow)" filter="url(#glow)"/>

  <g>
    <text x="96" y="108" fill="#f5f6f8" font-size="42" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-weight="700" letter-spacing=".5">
      Optimizing Home Launchers
    </text>

    <text x="96" y="142" fill="#8F99A2" font-size="18" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
      Faster • Leaner • Cleaner
    </text>

    <text x="96" y="184" fill="#f5f6f8" opacity=".85" font-size="16" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
      Making Android launchers lighter, smoother, and more efficient.
    </text>
    
    <text x="96" y="208" fill="#f5f6f8" opacity=".85" font-size="16" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
      Performance tuning
    </text>
    <text x="96" y="232" fill="#f5f6f8" opacity=".85" font-size="16" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
      Memory optimization
    </text>

    <text x="96" y="266" fill="#8F99A2" font-size="13" font-family="JetBrains Mono, Consolas, monospace" letter-spacing="1">
      Optimize() → Benchmark() → Repeat()
    </text>
  </g>
</svg>
